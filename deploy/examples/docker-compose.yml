services:
  harnspec:
    image: ghcr.io/codervisor/harnspec:latest
    ports:
      - "3000:3000"
    volumes:
      - harnspec-data:/home/harnspec/.harnspec
      # Mount project directories as needed:
      # - /path/to/project-a:/projects/project-a:ro
      # - /path/to/project-b:/projects/project-b:ro
    environment:
      - PORT=3000

volumes:
  harnspec-data:
