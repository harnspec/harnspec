# Render deployment blueprint for HarnSpec
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: harnspec
    runtime: image
    image:
      url: ghcr.io/codervisor/harnspec:latest
    envVars:
      - key: HARNSPEC_DATA_DIR
        value: /data
      - key: HARNSPEC_LOG_FORMAT
        value: json
      - key: HARNSPEC_API_KEY
        generateValue: true
      - key: PORT
        value: "3000"
    healthCheckPath: /health/ready
    disk:
      name: harnspec-data
      mountPath: /data
      sizeGB: 1
